name: Deploy Frontend to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: 22
  VERSION: v-${{ github.run_number }}-${{ github.sha }}

permissions:
  contents: read
  id-token: write

concurrency:
  group: frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://mealtap.in

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Audit & Fix Vulnerabilities
        run: |
          echo "Checking for npm vulnerabilities..."
          npm audit || echo "Vulnerabilities found, applying fix"
          npm audit fix --force || echo "Force fix applied"

      - name: Build Project
        run: npm run build

      # - name: Verify Build Output
      #   run: ls -la dist

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload versioned assets
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/${{ env.VERSION }} \
            --delete \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload versioned HTML
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/${{ env.VERSION }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Promote assets to current
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/current \
            --delete \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Promote HTML to current
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/current \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/" "/index.html"
